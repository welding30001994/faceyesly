<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeslyface · Red Social con Firebase</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== VARIABLES CSS ========== */
        :root {
            --bg-primary: #f0f4ff;
            --bg-secondary: #d9e2f0;
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-card-solid: #ffffff;
            --text-primary: #1a2a6c;
            --text-secondary: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow-color: rgba(0, 20, 40, 0.25);
            --input-bg: rgba(255, 255, 255, 0.7);
            --chat-bg: #f8faff;
            --post-bg: #ffffff;
            --gradient-start: #4a6cf7;
            --gradient-end: #7c5cfc;
            --blur-amount: 16px;
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        [data-theme="dark"] {
            --bg-primary: #0a0a0f;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(20, 20, 35, 0.85);
            --bg-card-solid: #1a1a2e;
            --text-primary: #e8e8ff;
            --text-secondary: #c8c8e8;
            --text-muted: #8888aa;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --input-bg: rgba(255, 255, 255, 0.05);
            --chat-bg: rgba(255, 255, 255, 0.05);
            --post-bg: rgba(30, 30, 50, 0.9);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 550px;
            background: var(--bg-card);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-radius: 48px;
            box-shadow: 0 30px 50px var(--shadow-color);
            padding: 24px 20px 32px;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        /* ========== THEME TOGGLE ========== */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-card-solid);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-primary);
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(30deg);
        }

        /* ============ AUTH ============ */
        #auth-section {
            display: block;
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
            padding-top: 10px;
        }

        .logo i {
            font-size: 52px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-right: 6px;
        }

        .logo span {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo .subtitle {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 400;
            background: none;
            -webkit-text-fill-color: var(--text-muted);
        }

        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: var(--border-color);
            padding: 6px;
            border-radius: 60px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-weight: 600;
            font-size: 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
            background: transparent;
            border: none;
        }

        .auth-tab.active {
            background: var(--bg-card-solid);
            box-shadow: 0 4px 12px var(--shadow-color);
            color: var(--text-primary);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-form input {
            padding: 16px 20px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            backdrop-filter: blur(4px);
            font-size: 15px;
            transition: 0.2s;
            outline: none;
            color: var(--text-primary);
        }

        .auth-form input::placeholder {
            color: var(--text-muted);
        }

        .auth-form input:focus {
            border-color: var(--gradient-start);
            box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.15);
            background: var(--bg-card-solid);
        }

        .auth-form button {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 18px rgba(74, 108, 247, 0.3);
            margin-top: 6px;
        }

        .auth-form button:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(74, 108, 247, 0.4);
        }

        .auth-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-error {
            color: #c0392b;
            font-size: 14px;
            text-align: center;
            background: rgba(192, 57, 43, 0.08);
            padding: 8px;
            border-radius: 30px;
            display: none;
        }

        .auth-success {
            color: #27ae60;
            font-size: 14px;
            text-align: center;
            background: rgba(39, 174, 96, 0.08);
            padding: 8px;
            border-radius: 30px;
            display: none;
        }

        .auth-switch {
            text-align: center;
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-switch a {
            color: var(--gradient-start);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-left: 6px;
        }

        /* ============ HOME ============ */
        #home-section {
            display: none;
        }

        .home-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .home-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .home-header h2 i {
            color: var(--gradient-start);
            margin-right: 8px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-badge span {
            font-weight: 600;
            color: var(--text-primary);
            background: var(--bg-card-solid);
            padding: 6px 14px;
            border-radius: 30px;
            box-shadow: 0 2px 8px var(--shadow-color);
            font-size: 14px;
        }

        .user-badge button {
            background: var(--bg-card-solid);
            border: 1px solid var(--border-color);
            font-size: 18px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            padding: 8px 10px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .user-badge button:hover {
            background: rgba(192, 57, 43, 0.1);
            color: #c0392b;
        }

        /* ========== CHAT SUPERIOR ========== */
        .chat-mini {
            background: var(--bg-card-solid);
            border-radius: 24px;
            padding: 14px 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px var(--shadow-color);
            border: 1px solid var(--border-color);
        }

        .chat-mini .chat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .chat-mini .chat-header i {
            font-size: 18px;
            color: var(--gradient-start);
        }

        .chat-messages {
            background: var(--chat-bg);
            border-radius: 20px;
            padding: 10px 14px;
            min-height: 80px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--gradient-start);
            border-radius: 10px;
        }

        .chat-messages .msg {
            background: var(--bg-primary);
            padding: 6px 14px;
            border-radius: 30px;
            display: inline-block;
            max-width: 85%;
            box-shadow: 0 1px 4px var(--shadow-color);
            word-wrap: break-word;
            color: var(--text-primary);
        }

        .chat-messages .msg.me {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
        }

        .chat-input {
            display: flex;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 60px;
            padding: 10px 16px;
            outline: none;
            font-size: 14px;
            background: var(--chat-bg);
            color: var(--text-primary);
        }

        .chat-input input::placeholder {
            color: var(--text-muted);
        }

        .chat-input input:focus {
            border-color: var(--gradient-start);
        }

        .chat-input button {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border: none;
            color: white;
            width: 44px;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-input button:hover {
            transform: scale(0.95);
        }

        /* ========== PUBLICAR ========== */
        .publish-box {
            background: var(--bg-card-solid);
            border-radius: 24px;
            padding: 14px 16px;
            box-shadow: 0 4px 12px var(--shadow-color);
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        .publish-box textarea {
            width: 100%;
            border: none;
            resize: none;
            padding: 8px 0 4px;
            font-size: 15px;
            outline: none;
            background: transparent;
            min-height: 50px;
            color: var(--text-primary);
        }

        .publish-box textarea::placeholder {
            color: var(--text-muted);
        }

        .publish-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
        }

        .publish-actions .left-icons {
            display: flex;
            gap: 14px;
            color: var(--gradient-start);
            font-size: 18px;
        }

        .publish-actions .left-icons i {
            cursor: pointer;
            transition: 0.2s;
            opacity: 0.7;
        }

        .publish-actions .left-icons i:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .publish-actions .right-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .publish-actions .right-actions #charCount {
            font-size: 12px;
            color: var(--text-muted);
        }

        .publish-actions button {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .publish-actions button:hover {
            transform: scale(0.97);
        }

        /* ========== FEED ========== */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: 12px;
        }

        .feed::-webkit-scrollbar {
            width: 4px;
        }

        .feed::-webkit-scrollbar-thumb {
            background: var(--gradient-start);
            border-radius: 10px;
        }

        .post {
            background: var(--post-bg);
            border-radius: 24px;
            padding: 14px 16px;
            box-shadow: 0 4px 12px var(--shadow-color);
            border: 1px solid var(--border-color);
            animation: fadeInUp 0.3s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .post-header .avatar {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .post-header .username {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .post-header .time {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 11px;
        }

        .post-content {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-secondary);
            padding: 4px 0 8px;
        }

        .post-image {
            margin-top: 8px;
            border-radius: 16px;
            max-width: 100%;
            overflow: hidden;
            background: var(--border-color);
        }

        .post-image img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }

        .post-image .placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80px;
            color: var(--text-muted);
            font-size: 13px;
            border: 1px dashed var(--border-color);
            border-radius: 16px;
        }

        .post-image .placeholder i {
            font-size: 24px;
            margin-right: 6px;
            color: var(--gradient-start);
        }

        /* ========== POST ACTIONS ========== */
        .post-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .post-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .post-actions button:hover {
            background: rgba(74, 108, 247, 0.08);
            color: var(--gradient-start);
        }

        .post-actions button.liked {
            color: #e74c3c;
        }

        .post-actions button.liked:hover {
            background: rgba(231, 76, 60, 0.08);
        }

        .post-actions button i {
            font-size: 14px;
        }

        /* ========== COMENTARIOS ========== */
        .comments-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            display: none;
        }

        .comments-section.open {
            display: block;
        }

        .comments-section .comment {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .comments-section .comment .comment-avatar {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 11px;
            flex-shrink: 0;
        }

        .comments-section .comment .comment-text {
            background: var(--chat-bg);
            padding: 4px 12px;
            border-radius: 16px;
            flex: 1;
        }

        .comments-section .comment .comment-text strong {
            color: var(--text-primary);
            margin-right: 4px;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .comment-input input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 14px;
            outline: none;
            font-size: 13px;
            background: var(--chat-bg);
            color: var(--text-primary);
        }

        .comment-input input::placeholder {
            color: var(--text-muted);
        }

        .comment-input input:focus {
            border-color: var(--gradient-start);
        }

        .comment-input button {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .comment-input button:hover {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card-solid);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 8px 24px var(--shadow-color);
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            border: 1px solid var(--border-color);
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            background: #27ae60;
            color: white;
        }

        .toast.error {
            background: #e74c3c;
            color: white;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .app-container {
                padding: 16px;
                border-radius: 28px;
            }

            .logo i {
                font-size: 40px;
            }
            .logo span {
                font-size: 24px;
            }

            .theme-toggle {
                width: 34px;
                height: 34px;
                font-size: 15px;
                top: 16px;
                right: 16px;
            }

            .chat-messages {
                max-height: 100px;
                min-height: 60px;
            }

            .feed {
                max-height: 300px;
            }

            .post {
                padding: 12px 14px;
            }

            .home-header h2 {
                font-size: 18px;
            }
            .user-badge span {
                font-size: 12px;
                padding: 4px 10px;
            }

            .publish-actions .left-icons {
                font-size: 16px;
                gap: 10px;
            }
            .publish-actions button {
                padding: 6px 14px;
                font-size: 12px;
            }
        }

        @media (max-width: 380px) {
            .app-container {
                padding: 12px;
                border-radius: 20px;
            }
            .chat-messages {
                max-height: 80px;
                min-height: 50px;
                font-size: 12px;
            }
            .post-actions {
                gap: 8px;
            }
            .post-actions button {
                font-size: 11px;
                padding: 3px 8px;
            }
        }
    </style>
</head>
<body>
<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<div class="app-container">
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
        <i class="fas fa-moon"></i>
    </button>

    <!-- ========== AUTH ========== -->
    <div id="auth-section">
        <div class="logo">
            <i class="fas fa-feather-alt"></i>
            <span>Yeslyface</span>
            <span class="subtitle">Conecta con el mundo</span>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin">Iniciar sesión</button>
            <button class="auth-tab" id="tabRegister">Registrarse</button>
        </div>

        <!-- Login -->
        <form id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
            <input type="password" id="loginPassword" placeholder="Contraseña" required>
            <button type="submit" id="loginBtn">
                <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i> Entrar
            </button>
            <div class="auth-error" id="loginError"></div>
        </form>

        <!-- Register -->
        <form id="registerForm" class="auth-form hidden">
            <input type="text" id="regName" placeholder="Nombre de usuario" required>
            <input type="email" id="regEmail" placeholder="Correo electrónico" required>
            <input type="password" id="regPassword" placeholder="Contraseña (mínimo 6 caracteres)" required>
            <button type="submit" id="registerBtn">
                <i class="fas fa-user-plus" style="margin-right: 8px;"></i> Crear cuenta
            </button>
            <div class="auth-error" id="registerError"></div>
            <div class="auth-success" id="registerSuccess">¡Cuenta creada! Inicia sesión.</div>
        </form>

        <div class="auth-switch">
            <span id="switchText">¿Ya tienes cuenta?</span>
            <a id="switchAction">Iniciar sesión</a>
        </div>
    </div>

    <!-- ========== HOME ========== -->
    <div id="home-section">
        <div class="home-header">
            <h2><i class="fas fa-home"></i> Inicio</h2>
            <div class="user-badge">
                <span id="displayUsername">Usuario</span>
                <button id="logoutBtn" title="Cerrar sesión">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>

        <!-- Chat Superior -->
        <div class="chat-mini">
            <div class="chat-header">
                <i class="fas fa-comment-dots"></i> Chat en vivo
                <span style="font-weight:400;font-size:11px;color:var(--text-muted);margin-left:auto;">
                    <i class="fas fa-circle" style="color:#27ae60;font-size:8px;"></i> Activo
                </span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="msg">👋 ¡Bienvenido a Yeslyface!</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Escribe un mensaje...">
                <button id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- Publicar -->
        <div class="publish-box">
            <textarea id="postText" placeholder="¿Qué estás pensando?" maxlength="280"></textarea>
            <div class="publish-actions">
                <div class="left-icons">
                    <i class="fas fa-image" id="photoBtn" title="Subir foto"></i>
                    <i class="fas fa-smile" id="emojiBtn" title="Emoji"></i>
                </div>
                <div class="right-actions">
                    <span id="charCount">0/280</span>
                    <button id="publishBtn"><i class="fas fa-pen-fancy" style="margin-right: 6px;"></i> Publicar</button>

<!-- ========== FIREBASE SDK ========== -->
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js",
            "firebase/storage": "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { 
        getAuth, 
        createUserWithEmailAndPassword, 
        signInWithEmailAndPassword,
        onAuthStateChanged,
        signOut,
        updateProfile
    } from "firebase/auth";
    import { 
        getDatabase, 
        ref, 
        set, 
        push, 
        onChildAdded, 
        get,
        remove,
        update
    } from "firebase/database";
    import { 
        getStorage, 
        ref as storageRef, 
        uploadBytes, 
        getDownloadURL 
    } from "firebase/storage";

    // ========== CONFIGURACIÓN DE FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCpFnSLx-ZUq6j27T-w_nvsdSvUrNs688g",
        authDomain: "heyding-kayser.firebaseapp.com",
        databaseURL: "https://heyding-kayser-default-rtdb.firebaseio.com",
        projectId: "heyding-kayser",
        storageBucket: "heyding-kayser.firebasestorage.app",
        messagingSenderId: "231005618306",
        appId: "1:231005618306:web:b349379b513145b6e6349b",
        measurementId: "G-0F9T839VVZ"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // ========== DOM REFERENCES ==========
    const authSection = document.getElementById('auth-section');
    const homeSection = document.getElementById('home-section');

    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginError = document.getElementById('loginError');
    const registerError = document.getElementById('registerError');
    const registerSuccess = document.getElementById('registerSuccess');
    const switchText = document.getElementById('switchText');
    const switchAction = document.getElementById('switchAction');

    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const regName = document.getElementById('regName');
    const regEmail = document.getElementById('regEmail');
    const regPassword = document.getElementById('regPassword');
    const registerBtn = document.getElementById('registerBtn');

    const displayUsername = document.getElementById('displayUsername');
    const logoutBtn = document.getElementById('logoutBtn');
    const postText = document.getElementById('postText');
    const publishBtn = document.getElementById('publishBtn');
    const feedContainer = document.getElementById('feedContainer');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSendBtn = document.getElementById('chatSendBtn');
    const charCount = document.getElementById('charCount');
    const photoBtn = document.getElementById('photoBtn');
    const emojiBtn = document.getElementById('emojiBtn');
    const fileInput = document.getElementById('fileInput');
    const toast = document.getElementById('toast');
    const themeToggle = document.getElementById('themeToggle');

    // ========== ESTADO ==========
    let currentUser = null;
    let posts = [];
    let chatMessagesData = ['👋 ¡Bienvenido a Yeslyface!'];
    let isListening = false;
    let isDarkTheme = false;

    // ========== TEMA OSCURO/CLARO ==========
    function toggleTheme() {
        isDarkTheme = !isDarkTheme;
        document.documentElement.setAttribute('data-theme', isDarkTheme ? 'dark' : 'light');
        themeToggle.innerHTML = isDarkTheme ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        localStorage.setItem('yeslyface-theme', isDarkTheme ? 'dark' : 'light');
    }

    // Cargar tema guardado
    const savedTheme = localStorage.getItem('yeslyface-theme');
    if (savedTheme === 'dark') {
        isDarkTheme = true;
        document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    }

    themeToggle.addEventListener('click', toggleTheme);

    // ========== FUNCIONES UTILITY ==========
    function showToast(message, type = 'info', duration = 3000) {
        toast.textContent = message;
        toast.className = `toast ${type}`;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }

    function formatTime(timestamp) {
        if (!timestamp) return 'ahora';
        const date = new Date(timestamp);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        
        if (diff < 60) return 'hace ' + diff + 's';
        if (diff < 3600) return 'hace ' + Math.floor(diff / 60) + 'm';
        if (diff < 86400) return 'hace ' + Math.floor(diff / 3600) + 'h';
        if (diff < 604800) return 'hace ' + Math.floor(diff / 86400) + 'd';
        return date.toLocaleDateString();
    }

    function getInitials(name) {
        if (!name) return '?';
        return name.charAt(0).toUpperCase();
    }

    function getUsername(user) {
        if (user.displayName) return user.displayName;
        if (user.email) return user.email.split('@')[0];
        return 'Usuario';
    }

    // ========== RENDER FUNCTIONS ==========
    function renderFeed() {
        if (!feedContainer) return;
        feedContainer.innerHTML = '';
        const sortedPosts = [...posts].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        
        sortedPosts.forEach(post => {
            const postDiv = document.createElement('div');
            postDiv.className = 'post';
            postDiv.dataset.id = post.id;
            
            const avatarLetter = getInitials(post.userName || 'U');
            const userDisplay = post.userName || 'Usuario';
            
            let imageHtml = '';
            if (post.imageUrl) {
                imageHtml = `
                    <div class="post-image">
                        <img src="${post.imageUrl}" alt="Imagen del post" loading="lazy">
                    </div>
                `;
            } else if (post.image) {
                imageHtml = `
                    <div class="post-image">
                        <div class="placeholder">
                            <i class="fas fa-image"></i> ${post.image}
                        </div>
                    </div>
                `;
            }
            
            const isLiked = post.likes && post.likes[currentUser?.uid] === true;
            const likesCount = post.likes ? Object.keys(post.likes).length : 0;
            const comments = post.comments || [];
            
            postDiv.innerHTML = `
                <div class="post-header">
                    <div class="avatar">${avatarLetter}</div>
                    <div class="username">${userDisplay}</div>
                    <div class="time">${formatTime(post.timestamp)}</div>
                </div>
                <div class="post-content">${post.text}</div>
                ${imageHtml}
                <div class="post-actions">
                    <button class="like-btn ${isLiked ? 'liked' : ''}" data-id="${post.id}">
                        <i class="fas fa-heart"></i> ${likesCount}
                    </button>
                    <button class="comment-toggle-btn" data-id="${post.id}">
                        <i class="fas fa-comment"></i> ${comments.length}
                    </button>
                    ${currentUser && post.uid === currentUser.uid ? `
                        <button class="delete-btn" data-id="${post.id}">
                            <i class="fas fa-trash"></i>
                        </button>
                    ` : ''}
                </div>
                <div class="comments-section" data-id="${post.id}">
                    <div class="comments-list">
                        ${comments.map(c => `
                            <div class="comment">
                                <div class="comment-avatar">${getInitials(c.userName)}</div>
                                <div class="comment-text">
                                    <strong>${c.userName}</strong> ${c.text}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="comment-input">
                        <input type="text" placeholder="Escribe un comentario..." class="comment-input-field" data-id="${post.id}">
                        <button class="comment-send-btn" data-id="${post.id}">Enviar</button>
                    </div>
                </div>
            `;
            feedContainer.appendChild(postDiv);
        });

        // Event listeners
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const postId = btn.dataset.id;
                await toggleLike(postId);
            });
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const postId = btn.dataset.id;
                if (confirm('¿Eliminar este post?')) {
                    await deletePost(postId);
                }
            });
        });

        document.querySelectorAll('.comment-toggle-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const postId = btn.dataset.id;
                const section = document.querySelector(`.comments-section[data-id="${postId}"]`);
                if (section) {
                    section.classList.toggle('open');
                }
            });
        });

        document.querySelectorAll('.comment-send-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const postId = btn.dataset.id;
                const input = document.querySelector(`.comment-input-field[data-id="${postId}"]`);
                if (input && input.value.trim()) {
                    await addComment(postId, input.value.trim());
                    input.value = '';
                }
            });
        });

        document.querySelectorAll('.comment-input-field').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const postId = input.dataset.id;
                    const btn = document.querySelector(`.comment-send-btn[data-id="${postId}"]`);
                    if (btn) btn.click();
                }
            });
        });
    }

    function renderChat() {
        if (!chatMessages) return;
        chatMessages.innerHTML = '';
        // Mostrar últimos 10 mensajes
        const lastMessages = chatMessagesData.slice(-10);
        lastMessages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            if (currentUser && msg.includes(currentUser.displayName || currentUser.email)) {
                msgDiv.classList.add('me');
            }
            msgDiv.textContent = msg;
            chatMessages.appendChild(msgDiv);
        });
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function setLoading(button, isLoading) {
        if (!button) return;
        if (isLoading) {
            button.disabled = true;
            button.innerHTML = '<span class="loading-spinner"></span> Cargando...';
        } else {
            button.disabled = false;
            const originalText = button.id === 'loginBtn' ? 'Entrar' : 'Crear cuenta';
            const icon = button.id === 'loginBtn' ? 'fa-sign-in-alt' : 'fa-user-plus';
            button.innerHTML = `<i class="fas ${icon}" style="margin-right: 8px;"></i> ${originalText}`;
        }
    }

    function showHome(user) {
        currentUser = user;
        displayUsername.textContent = getUsername(user);
        authSection.style.display = 'none';
        homeSection.style.display = 'block';
        loadPostsFromFirebase();
        loadChatFromFirebase();
    }

    function showAuth() {
        currentUser = null;
        homeSection.style.display = 'none';
        authSection.style.display = 'block';
        loginForm.reset();
        registerForm.reset();
        loginError.style.display = 'none';
        registerError.style.display = 'none';
        registerSuccess.style.display = 'none';
        if (isListening) {
            isListening = false;
        }
    }

    // ========== FUNCIONES DE BASE DE DATOS ==========
    
    // --- POSTS ---
    async function savePostToFirebase(text, imageUrl = null) {
        if (!currentUser) {
            showToast('Debes iniciar sesión', 'error');
            return;
        }
        if (!text.trim() && !imageUrl) {
            showToast('Escribe algo o añade una imagen', 'error');
            return;
        }

        try {
            const postsRef = ref(db, 'posts');
            const newPostRef = push(postsRef);
            await set(newPostRef, {
                text: text.trim() || '(sin texto)',
                imageUrl: imageUrl,
                uid: currentUser.uid,
                userName: currentUser.displayName || currentUser.email?.split('@')[0] || 'Usuario',
                userEmail: currentUser.email,
                timestamp: Date.now(),
                likes: {},
                comments: []
            });
            showToast('¡Publicado!', 'success');
            postText.value = '';
            updateCharCount();
        } catch (error) {
            console.error('Error al guardar post:', error);
            showToast('Error al publicar: ' + error.message, 'error');
        }
    }

    async function loadPostsFromFirebase() {
        try {
            const postsRef = ref(db, 'posts');
            const snapshot = await get(postsRef);
            if (snapshot.exists()) {
                const data = snapshot.val();
                posts = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                }));
                renderFeed();
            } else {
                posts = [];
                renderFeed();
            }
            
            if (!isListening) {
                isListening = true;
                onChildAdded(postsRef, (snapshot) => {
                    const newPost = { id: snapshot.key, ...snapshot.val() };
                    const exists = posts.some(p => p.id === newPost.id);
                    if (!exists) {
                        posts.push(newPost);
                        renderFeed();
                    }
                });
            }
        } catch (error) {
            console.error('Error al cargar posts:', error);
            showToast('Error al cargar posts', 'error');
        }
    }

    async function toggleLike(postId) {
        if (!currentUser) {
            showToast('Inicia sesión para dar like', 'error');
            return;
        }

        try {
            const postRef = ref(db, `posts/${postId}/likes/${currentUser.uid}`);
            const snapshot = await get(postRef);
            
            if (snapshot.exists()) {
                await remove(postRef);
                showToast('Quitaste tu like', 'info');
            } else {
                await set(postRef, true);
                showToast('¡Te gusta! ❤️', 'success');
            }
            
            // Recargar posts
            await loadPostsFromFirebase();
        } catch (error) {
            console.error('Error al toggle like:', error);
            showToast('Error al dar like', 'error');
        }
    }

    async function deletePost(postId) {
        if (!currentUser) return;
        
        try {
            await remove(ref(db, `posts/${postId}`));
            showToast('Post eliminado', 'info');
            posts = posts.filter(p => p.id !== postId);
            renderFeed();
        } catch (error) {
            console.error('Error al eliminar post:', error);
            showToast('Error al eliminar', 'error');
        }
    }

    // --- COMENTARIOS ---
    async function addComment(postId, text) {
        if (!currentUser) {
            showToast('Inicia sesión para comentar', 'error');
            return;
        }
        if (!text.trim()) return;

        try {
            const postRef = ref(db, `posts/${postId}/comments`);
            const newCommentRef = push(postRef);
            await set(newCommentRef, {
                text: text.trim(),
                uid: currentUser.uid,
                userName: currentUser.displayName || currentUser.email?.split('@')[0] || 'Usuario',
                timestamp: Date.now()
            });
            showToast('Comentario añadido', 'success');
            await loadPostsFromFirebase();
        } catch (error) {
            console.error('Error al añadir comentario:', error);
            showToast('Error al comentar', 'error');
        }
    }

    // --- CHAT ---
    async function saveChatToFirebase(message) {
        if (!currentUser) return;
        if (!message.trim()) return;

        try {
            const chatRef = ref(db, 'chat');
            const newMsgRef = push(chatRef);
            await set(newMsgRef, {
                text: message.trim(),
                uid: currentUser.uid,
                userName: currentUser.displayName || currentUser.email?.split('@')[0] || 'Usuario',
                timestamp: Date.now()
            });
        } catch (error) {
            console.error('Error al guardar mensaje:', error);
            showToast('Error al enviar mensaje', 'error');
        }
    }

    async function loadChatFromFirebase() {
        try {
            const chatRef = ref(db, 'chat');
            const snapshot = await get(chatRef);
            if (snapshot.exists()) {
                const data = snapshot.val();
                chatMessagesData = Object.values(data)
                    .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0))
                    .map(msg => `${msg.userName}: ${msg.text}`);
                renderChat();
            }
            
            onChildAdded(chatRef, (snapshot) => {
                const msg = snapshot.val();
                const fullMsg = `${msg.userName}: ${msg.text}`;
                chatMessagesData.push(fullMsg);
                if (chatMessagesData.length > 50) {
                    chatMessagesData = chatMessagesData.slice(-50);
                }
                renderChat();
            });
        } catch (error) {
            console.error('Error al cargar chat:', error);
        }
    }

    // --- IMÁGENES ---
    async function uploadImage(file) {
        if (!currentUser) {
            showToast('Debes iniciar sesión', 'error');
            return null;
        }

        try {
            const filePath = `posts/${currentUser.uid}/${Date.now()}_${file.name}`;
            const storageReference = storageRef(storage, filePath);
            await uploadBytes(storageReference, file);
            const url = await getDownloadURL(storageReference);
            return url;
        } catch (error) {
            console.error('Error al subir imagen:', error);
            showToast('Error al subir imagen: ' + error.message, 'error');
            return null;
        }
    }

    // ========== EVENTOS UI ==========
    
    // Tabs
    tabLogin.addEventListener('click', () => {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        switchText.textContent = '¿No tienes cuenta?';
        switchAction.textContent = 'Registrarse';
        loginError.style.display = 'none';
        registerError.style.display = 'none';
        registerSuccess.style.display = 'none';
    });

    tabRegister.addEventListener('click', () => {
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
        switchText.textContent = '¿Ya tienes cuenta?';
        switchAction.textContent = 'Iniciar sesión';
        loginError.style.display = 'none';
        registerError.style.display = 'none';
        registerSuccess.style.display = 'none';
    });

    switchAction.addEventListener('click', () => {
        if (switchAction.textContent === 'Registrarse') {
            tabRegister.click();
        } else {
            tabLogin.click();
        }
    });

    // Contador de caracteres
    function updateCharCount() {
        const count = postText.value.length;
        charCount.textContent = `${count}/280`;
        if (count > 260) {
            charCount.style.color = '#e67e22';
        } else if (count > 270) {
            charCount.style.color = '#e74c3c';
        } else {
            charCount.style.color = 'var(--text-muted)';
        }
    }

    postText.addEventListener('input', updateCharCount);

    // Emojis
    emojiBtn.addEventListener('click', () => {
        const emojis = ['😊', '😂', '❤️', '🔥', '👏', '🙌', '✨', '🌟', '💪', '🎉', '🥳', '🤔', '😎', '👍', '💯', '🌈', '⭐', '🎊'];
        const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
        postText.value += randomEmoji;
        updateCharCount();
        postText.focus();
    });

    // Subir foto
    photoBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
            if (file.size > 5 * 1024 * 1024) {
                showToast('La imagen no puede superar 5MB', 'error');
                fileInput.value = '';
                return;
            }
            
            showToast('Subiendo imagen...', 'info', 5000);
            const url = await uploadImage(file);
            fileInput.value = '';
            
            if (url) {
                const text = postText.value.trim() || '📸';
                await savePostToFirebase(text, url);
            }
        }
    });

    // ========== LOGIN ==========
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();

        if (!email || !password) {
            loginError.textContent = 'Completa todos los campos.';
            loginError.style.display = 'block';
            return;
        }

        setLoading(loginBtn, true);
        loginError.style.display = 'none';

        try {
            await signInWithEmailAndPassword(auth, email, password);
            loginForm.reset();
        } catch (error) {
            let msg = 'Error al iniciar sesión.';
            if (error.code === 'auth/user-not-found') msg = 'Usuario no encontrado.';
            else if (error.code === 'auth/wrong-password') msg = 'Contraseña incorrecta.';
            else if (error.code === 'auth/invalid-email') msg = 'Correo inválido.';
            else if (error.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Intenta más tarde.';
            loginError.textContent = msg;
            loginError.style.display = 'block';
        } finally {
            setLoading(loginBtn, false);
        }
    });

    // ========== REGISTER ==========
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = regName.value.trim();
        const email = regEmail.value.trim();
        const password = regPassword.value.trim();

        if (!name || !email || password.length < 6) {
            registerError.textContent = 'Nombre, correo y contraseña (mín 6 caracteres)';
            registerError.style.display = 'block';
            registerSuccess.style.display = 'none';
            return;
        }

        setLoading(registerBtn, true);
        registerError.style.display = 'none';
        registerSuccess.style.display = 'none';

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(userCredential.user, {
                displayName: name
            });
            registerSuccess.textContent = '¡Cuenta creada exitosamente!';
            registerSuccess.style.display = 'block';
            registerForm.reset();
            setTimeout(() => {
                tabLogin.click();
                registerSuccess.style.display = 'none';
            }, 2000);
        } catch (error) {
            let msg = 'Error al crear la cuenta.';
            if (error.code === 'auth/email-already-in-use') msg = 'Este correo ya está registrado.';
            else if (error.code === 'auth/invalid-email') msg = 'Correo inválido.';
            else if (error.code === 'auth/weak-password') msg = 'Contraseña demasiado débil (mín 6 caracteres).';
            registerError.textContent = msg;
            registerError.style.display = 'block';
        } finally {
            setLoading(registerBtn, false);
        }
    });

    // ========== LOGOUT ==========
    logoutBtn.addEventListener('click', async () => {
        try {
            await signOut(auth);
            showAuth();
            showToast('Sesión cerrada', 'info');
        } catch (error) {
            console.error('Error al cerrar sesión:', error);
            showToast('Error al cerrar sesión', 'error');
        }
    });

    // ========== PUBLICAR ==========
    publishBtn.addEventListener('click', async () => {
        const text = postText.value.trim();
        if (!text) {
            showToast('Escribe algo para publicar', 'error');
            return;
        }
        await savePostToFirebase(text);
    });

    // ========== CHAT ==========
    chatSendBtn.addEventListener('click', async () => {
        const msg = chatInput.value.trim();
        if (!msg) {
            showToast('Escribe un mensaje', 'error');
            return;
        }
        await saveChatToFirebase(msg);
        chatInput.value = '';
        chatInput.focus();
    });

    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            chatSendBtn.click();
        }
    });

    // ========== MONITOREO DE AUTENTICACIÓN ==========
    onAuthStateChanged(auth, (user) => {
        if (user) {
            showHome(user);
        } else {
            showAuth();
        }
    });

    // ========== INICIALIZAR ==========
    authSection.style.display = 'block';
    homeSection.style.display = 'none';
    updateCharCount();

    console.log('✅ Yeslyface v2 con todas las funcionalidades');
    console.log('📝 Características:');
    console.log('  🔐 Autenticación Firebase');
    console.log('  💬 Chat en tiempo real (superior)');
    console.log('  ❤️ Sistema de likes');
    console.log('  💬 Comentarios en posts');
    console.log('  🖼️ Subida de imágenes');
    console.log('  🌓 Modo oscuro/claro');
    console.log('  📱 Responsive');
</script>
</body>
</html>
